<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1a6fb5"/>

  <!-- AC unit body -->
  <rect x="16" y="36" width="96" height="44" rx="6" fill="white" opacity="0.95"/>
  <!-- Grille ventilation -->
  <rect x="24" y="44" width="6" height="28" rx="2" fill="#1a6fb5" opacity="0.4"/>
  <rect x="34" y="44" width="6" height="28" rx="2" fill="#1a6fb5" opacity="0.4"/>
  <rect x="44" y="44" width="6" height="28" rx="2" fill="#1a6fb5" opacity="0.4"/>
  <!-- Panel right -->
  <rect x="62" y="44" width="44" height="12" rx="3" fill="#e8f4fd"/>
  <circle cx="74" cy="50" r="3" fill="#1a6fb5"/>
  <circle cx="86" cy="50" r="3" fill="#28a745"/>
  <circle cx="98" cy="50" r="3" fill="#dc3545"/>

  <!-- Snowflake / cold symbol -->
  <g transform="translate(64, 96)" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
    <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
    <line x1="8.5" y1="-8.5" x2="-8.5" y2="8.5"/>
    <line x1="-4" y1="-12" x2="0" y2="-8"/><line x1="4" y1="-12" x2="0" y2="-8"/>
    <line x1="-4" y1="12" x2="0" y2="8"/><line x1="4" y1="12" x2="0" y2="8"/>
    <line x1="-12" y1="-4" x2="-8" y2="0"/><line x1="-12" y1="4" x2="-8" y2="0"/>
    <line x1="12" y1="-4" x2="8" y2="0"/><line x1="12" y1="4" x2="8" y2="0"/>
  </g>
</svg>
